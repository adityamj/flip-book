
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Magazine Flipbook</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

<style>
body{
  margin:0;
  display:flex;
  height:100vh;
  background:#111;
  font-family:sans-serif;
  overflow:hidden;
}

#thumbs{
  width:160px;
  overflow-y:auto;
  background:#222;
  padding:4px;
  transition:transform 0.25s ease;
  z-index:20;
}

#thumbs img{
  display:block;
  width:100%;
  aspect-ratio:210 / 297;
  cursor:pointer;
  margin-bottom:6px;
  object-fit:contain;
  background:#333;
}

#viewer{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  min-width:0;
  padding:16px;
  box-sizing:border-box;
}

#book{
  width:min(calc(100% - 120px), 1414px);
  height:auto;
  max-height:calc(100vh - 32px);
  aspect-ratio:1414 / 1000;
  touch-action:pan-y;
}

#thumb-toggle{
  display:none;
  position:absolute;
  top:16px;
  left:16px;
  width:44px;
  height:44px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,0.14);
  color:#fff;
  font-size:24px;
  cursor:pointer;
  z-index:30;
  backdrop-filter:blur(6px);
}

.nav-button{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,0.92);
  color:#111;
  font-size:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:40;
}

.nav-button:hover{
  background:#ffffff;
}

#prev{
  left:16px;
}

#next{
  right:16px;
}

@media (max-width: 900px) {
  #viewer{
    padding:10px 8px;
  }

  #thumb-toggle{
    display:block;
    top:10px;
    left:10px;
  }

  #thumbs{
    position:fixed;
    top:0;
    left:0;
    height:100vh;
    padding-top:68px;
    box-sizing:border-box;
    box-shadow:0 0 24px rgba(0,0,0,0.35);
  }

  #thumbs.is-collapsed{
    transform:translateX(-100%);
  }

  #book{
    width:min(calc(100vw - 56px), 707px);
    height:auto;
    max-height:calc(100vh - 20px);
    aspect-ratio:707 / 1000;
  }

  .nav-button{
    width:40px;
    height:40px;
    font-size:22px;
  }

  #prev{
    left:8px;
  }

  #next{
    right:8px;
  }
}
</style>
</head>

<body>

<div id="thumbs" class="is-collapsed"></div>

<div id="viewer">
  <button id="thumb-toggle" aria-label="Toggle thumbnails">&#9776;</button>
  <button id="prev" class="nav-button" aria-label="Previous page">&#8249;</button>
  <div id="book"></div>
  <button id="next" class="nav-button" aria-label="Next page">&#8250;</button>
</div>

<script>

const thumbsDiv=document.getElementById("thumbs")
const bookDiv=document.getElementById("book")
const thumbToggle=document.getElementById("thumb-toggle")
const prevButton=document.getElementById("prev")
const nextButton=document.getElementById("next")

function syncThumbState() {
  if (window.innerWidth <= 900) {
    thumbsDiv.classList.add("is-collapsed")
  } else {
    thumbsDiv.classList.remove("is-collapsed")
  }
}

thumbToggle.onclick = () => {
  thumbsDiv.classList.toggle("is-collapsed")
}

window.addEventListener("resize", syncThumbState)
syncThumbState()

function showMessage(message) {
  bookDiv.textContent = message
  bookDiv.style.color = "#fff"
  bookDiv.style.display = "flex"
  bookDiv.style.alignItems = "center"
  bookDiv.style.justifyContent = "center"
}

function getPageFileName(pageNumber) {
  return `page-${String(pageNumber).padStart(3, "0")}.jpg`
}

async function getPageCount() {
  const urlCount = parseInt(new URLSearchParams(window.location.search).get("pages"), 10)

  if (Number.isInteger(urlCount) && urlCount > 0) {
    return urlCount
  }

  const response = await fetch("pagecount.txt", { cache: "no-store" })

  if (!response.ok) {
    throw new Error("Could not load pagecount.txt")
  }

  const text = await response.text()
  const fileCount = parseInt(text.trim(), 10)

  if (!Number.isInteger(fileCount) || fileCount <= 0) {
    throw new Error("pagecount.txt must contain a positive integer")
  }

  return fileCount
}

async function initFlipbook() {
  try {
    const pageCount = await getPageCount()
    const pageElements=[]
    const thumbImages=[]
    let pageFlip
    let touchStartX = null
    let touchStartY = null

    function ensurePageImages(centerIndex) {
      const safeIndex = Number.isInteger(centerIndex) ? centerIndex : 0
      const start = Math.max(0, safeIndex - 2)
      const end = Math.min(pageElements.length - 1, safeIndex + 3)

      for (let index = start; index <= end; index++) {
        const pageImage = pageElements[index].querySelector("img")

        if (!pageImage.src) {
          pageImage.src = pageImage.dataset.src
        }
      }
    }

    function loadThumbImage(thumbImage) {
      if (!thumbImage.src) {
        thumbImage.src = thumbImage.dataset.src
      }
    }

    function initThumbLazyLoading() {
      if (!("IntersectionObserver" in window)) {
        for (const thumbImage of thumbImages) {
          loadThumbImage(thumbImage)
        }

        return
      }

      const thumbObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            loadThumbImage(entry.target)
            thumbObserver.unobserve(entry.target)
          }
        }
      }, {
        root: thumbsDiv,
        rootMargin: "200px 0px",
        threshold: 0.01
      })

      for (const thumbImage of thumbImages) {
        thumbObserver.observe(thumbImage)
      }
    }

    for(let i=1;i<=pageCount;i++){
      const fileName = getPageFileName(i)

      const img=document.createElement("img")
      img.dataset.src=`thumbs/${fileName}`
      img.alt=`Thumbnail ${i}`
      img.loading="lazy"
      img.decoding="async"
      img.onclick=()=>{
        pageFlip.flip(i - 1)

        if (window.innerWidth <= 900) {
          thumbsDiv.classList.add("is-collapsed")
        }
      }
      thumbsDiv.appendChild(img)
      thumbImages.push(img)

      const page=document.createElement("div")
      const pageImage=document.createElement("img")

      page.style.width="100%"
      page.style.height="100%"
      page.style.background="#fff"

      pageImage.dataset.src=`pages/${fileName}`
      pageImage.alt=`Page ${i}`
      pageImage.style.width="100%"
      pageImage.style.height="100%"
      pageImage.style.objectFit="contain"
      pageImage.style.objectPosition="center"

      if (i <= 4) {
        pageImage.src = pageImage.dataset.src
      }

      page.appendChild(pageImage)
      bookDiv.appendChild(page)
      pageElements.push(page)

    }

    initThumbLazyLoading()

    pageFlip = new St.PageFlip(
      bookDiv,
      {
        size:"stretch",
        minWidth:198,
        maxWidth:707,
        minHeight:350,
        maxHeight:1000,
        width:707,
        height:1000,
        usePortrait:true,
        autoSize:true,
        showCover:true,
        mobileScrollSupport:false
      }
    )

    pageFlip.loadFromHTML(pageElements)
    ensurePageImages(0)

    prevButton.onclick = () => pageFlip.flipPrev()
    nextButton.onclick = () => pageFlip.flipNext()

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        event.preventDefault()
        pageFlip.flipPrev()
      }

      if (event.key === "ArrowRight") {
        event.preventDefault()
        pageFlip.flipNext()
      }
    })

    bookDiv.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0]
      touchStartX = touch.clientX
      touchStartY = touch.clientY
    }, { passive: true })

    bookDiv.addEventListener("touchend", (event) => {
      if (touchStartX === null || touchStartY === null) {
        return
      }

      const touch = event.changedTouches[0]
      const deltaX = touch.clientX - touchStartX
      const deltaY = touch.clientY - touchStartY

      touchStartX = null
      touchStartY = null

      if (Math.abs(deltaX) < 40 || Math.abs(deltaX) < Math.abs(deltaY)) {
        return
      }

      if (deltaX < 0) {
        pageFlip.flipNext()
      } else {
        pageFlip.flipPrev()
      }
    }, { passive: true })

    pageFlip.on("flip", (event)=>{
      ensurePageImages(event.data)
    })
  } catch (error) {
    showMessage(error.message)
  }
}

initFlipbook()

</script>

</body>
</html>
